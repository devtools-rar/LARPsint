<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT TOOLKIT // BREACH ANALYSIS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>OSINT TOOLKIT // DATABASE ANALYZER</h1>

        <main>
            <section class="search-section">
                <div class="tabs">
                    <button class="tab active" data-type="phone">PHONE_TRACE</button>
                    <button class="tab" data-type="discord">DISCORD_ID</button>

                <div class="input-row">
                    <input type="text" id="searchInput" placeholder="ENTER_TARGET_DATA..." spellcheck="false">
                    <button id="searchBtn">EXECUTE_SCAN</button>

            </section>

            <div class="scan-log" id="scanLog">
                <!-- Live scan feedback -->
            </div>

            <section class="results-area" id="resultsArea">
                <div id="resultsContent">
                    <!-- Tables will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>

</html>
